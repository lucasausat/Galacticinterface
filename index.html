<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GALAXY ENGINE</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    z-index:10;
}
.panel {
    background:rgba(0,0,0,0.6);
    padding:15px;
    border:1px solid rgba(0,150,255,0.3);
    margin-bottom:10px;
}
</style>
</head>

<body>

<div id="ui">
    <div class="panel">
        <b>🚀 SPACE CONTROL</b><br>
        WASD = bewegen<br>
        Maus = schauen<br>
        Scroll = Zoom<br>
        Klick = Planet auswählen
    </div>

    <div id="info" class="panel">Bereit...</div>
</div>

<script>

/* =====================
   BASIC SETUP
===================== */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 5000);
camera.position.z = 50;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.PointLight(0xffffff, 2);
scene.add(light);

/* =====================
   STARFIELD
===================== */
const starGeo = new THREE.BufferGeometry();
let starVertices = [];

for(let i=0;i<15000;i++){
    starVertices.push(
        Math.random()*4000-2000,
        Math.random()*4000-2000,
        Math.random()*4000-2000
    );
}

starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices,3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff}));
scene.add(stars);

/* =====================
   GALAXY SPIRALS
===================== */
function createGalaxy(offsetX){
    const geo = new THREE.BufferGeometry();
    let verts = [];

    for(let i=0;i<4000;i++){
        let angle = i*0.1;
        let radius = i*0.02;

        let x = Math.cos(angle)*radius + offsetX;
        let z = Math.sin(angle)*radius;
        let y = (Math.random()-0.5)*2;

        verts.push(x,y,z);
    }

    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts,3));
    scene.add(new THREE.Points(geo,new THREE.PointsMaterial({size:0.1})));
}

// mehrere Galaxien
createGalaxy(0);
createGalaxy(300);
createGalaxy(-300);

/* =====================
   TEXTURES
===================== */
const loader = new THREE.TextureLoader();

const earthTex = loader.load("https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg");

/* =====================
   PLANETS
===================== */
const planets = [];

function createPlanet(name, size, dist, texture){
    const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(size, 64,64),
        new THREE.MeshStandardMaterial({map:texture})
    );
    mesh.position.x = dist;
    mesh.userData.name = name;
    scene.add(mesh);
    planets.push(mesh);
}

createPlanet("Erde", 3, 20, earthTex);

/* =====================
   ISS (LIVE API)
===================== */
const iss = new THREE.Mesh(
    new THREE.BoxGeometry(0.5,0.5,1),
    new THREE.MeshBasicMaterial({color:0xffffff})
);
scene.add(iss);

async function updateISS(){
    try{
        const res = await fetch("https://api.wheretheiss.at/v1/satellites/25544");
        const data = await res.json();

        // Mapping Position fake auf Szene
        iss.position.x = data.latitude;
        iss.position.z = data.longitude;

        document.getElementById("info").innerText =
            "ISS Position: " + data.latitude.toFixed(2) + " / " + data.longitude.toFixed(2);

    }catch(e){}
}

setInterval(updateISS, 5000);

/* =====================
   NASA DATA
===================== */
async function loadNASA(){
    const res = await fetch("https://api.le-systeme-solaire.net/rest/bodies/");
    const data = await res.json();
    console.log(data);
}
loadNASA();

/* =====================
   CONTROLS (WASD + MOUSE)
===================== */
let keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

let mouseX=0, mouseY=0;

window.addEventListener("mousemove", e=>{
    mouseX = (e.clientX/window.innerWidth -0.5)*2;
    mouseY = (e.clientY/window.innerHeight -0.5)*2;
});

window.addEventListener("wheel", e=>{
    camera.position.z += e.deltaY * 0.05;
});

/* =====================
   CLICK PLANET
===================== */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click", e=>{
    mouse.x = (e.clientX/innerWidth)*2-1;
    mouse.y = -(e.clientY/innerHeight)*2+1;

    raycaster.setFromCamera(mouse,camera);
    const hit = raycaster.intersectObjects(planets);

    if(hit.length>0){
        let p = hit[0].object;
        document.getElementById("info").innerText = "Planet: " + p.userData.name;

        camera.position.set(p.position.x, p.position.y, p.position.z+5);
    }
});

/* =====================
   MOVE
===================== */
function move(){
    let speed = 0.8;

    if(keys["w"]) camera.position.z -= speed;
    if(keys["s"]) camera.position.z += speed;
    if(keys["a"]) camera.position.x -= speed;
    if(keys["d"]) camera.position.x += speed;

    camera.rotation.y = -mouseX * 0.5;
    camera.rotation.x = -mouseY * 0.3;
}

/* =====================
   LOOP
===================== */
function animate(){
    requestAnimationFrame(animate);

    move();

    planets.forEach(p=>{
        p.rotation.y += 0.005;
    });

    renderer.render(scene, camera);
}
animate();

/* =====================
   RESIZE
===================== */
window.addEventListener("resize", ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
