<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SPACE EXPLORER PRO - MODERN</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; font-family: monospace; }

/* HUD */
#hud { position:absolute; width:100%; height:100%; color:#00f2ff; pointer-events:none; }

#topBar {
    position:absolute; top:20px; left:50%;
    transform:translateX(-50%);
    display:flex; gap:40px; font-size:14px;
}

#bottomBar {
    position:absolute; bottom:20px; left:50%;
    transform:translateX(-50%);
    display:flex; gap:60px;
}

#centerReticle {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    font-size:22px;
}
</style>
</head>

<body>

<div id="hud">
    <div id="topBar">
        <span id="target">TARGET: NONE</span>
        <span id="distance">DIST: 0 km</span>
    </div>

    <div id="centerReticle">⦿</div>

    <div id="bottomBar">
        <div>SPEED: <span id="speed">0</span> km/s</div>
        <div>MODE: <span id="mode">CRUISE</span></div>
    </div>
</div>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 50000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const loader = new THREE.TextureLoader();

/* LIGHT */
scene.add(new THREE.PointLight(0xffffff,2));

/* SHIP */
const ship = new THREE.Group();
scene.add(ship);

const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5,0.6,3,16),
    new THREE.MeshStandardMaterial({color:0xdddddd, metalness:1})
);
body.rotation.x = Math.PI/2;
ship.add(body);

const engineGlow = new THREE.Mesh(
    new THREE.SphereGeometry(0.4,16,16),
    new THREE.MeshBasicMaterial({color:0x00ffff})
);
engineGlow.position.z = 1.5;
ship.add(engineGlow);

/* PLANETS */
const planets = [];
function createPlanet(name,size,x,z){
    const p = new THREE.Mesh(
        new THREE.SphereGeometry(size,32,32),
        new THREE.MeshStandardMaterial({color:Math.random()*0xffffff})
    );
    p.position.set(x,0,z);
    p.userData = {name,size};
    scene.add(p);
    planets.push(p);
}
createPlanet("Terra",10,800,-600);
createPlanet("Mars",8,-500,-200);

/* ASTEROIDS */
const asteroids = [];
for(let i=0;i<200;i++){
    const a = new THREE.Mesh(
        new THREE.IcosahedronGeometry(Math.random()*2),
        new THREE.MeshStandardMaterial({color:0x888888})
    );
    a.position.set(
        Math.random()*2000-1000,
        Math.random()*200-100,
        Math.random()*2000-1000
    );
    scene.add(a);
    asteroids.push(a);
}

/* STATIONS */
const stations = [];
for(let i=0;i<5;i++){
    const s = new THREE.Mesh(
        new THREE.BoxGeometry(5,2,5),
        new THREE.MeshStandardMaterial({color:0x6666ff})
    );
    s.userData = {
        angle: Math.random()*Math.PI*2,
        radius: 400,
        speed: 0.002
    };
    scene.add(s);
    stations.push(s);
}

/* STARS */
const starGeo = new THREE.BufferGeometry();
const starV=[];
for(let i=0;i<20000;i++){
    starV.push(
        (Math.random()-0.5)*40000,
        (Math.random()-0.5)*40000,
        (Math.random()-0.5)*40000
    );
}
starGeo.setAttribute('position',new THREE.Float32BufferAttribute(starV,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({size:1})));

/* CONTROLS */
let keys={}, velocity=new THREE.Vector3();
let speed=0, warp=false;

addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()]=true;
    if(e.key==="f") warp=!warp; // WARP TOGGLE
});
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/* TARGET */
function getClosestPlanet(){
    let c=null, d=Infinity;
    planets.forEach(p=>{
        let dist=ship.position.distanceTo(p.position);
        if(dist<d){ d=dist; c=p; }
    });
    return c;
}

/* SCAN */
function scan(){
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);
    const hit = ray.intersectObjects(planets);
    if(hit.length>0){
        document.getElementById("mode").innerText =
        "SCAN: " + hit[0].object.userData.name;
    }
}

/* UPDATE */
function update(){

    let acc = warp ? 0.5 : (keys["shift"]?0.08:0.02);

    const dir = new THREE.Vector3(0,0,-1).applyQuaternion(ship.quaternion);

    if(keys["w"]) velocity.add(dir.clone().multiplyScalar(acc));
    if(keys["s"]) velocity.add(dir.clone().multiplyScalar(-acc));

    if(keys["a"]) ship.rotation.y+=0.03;
    if(keys["d"]) ship.rotation.y-=0.03;

    ship.position.add(velocity);
    velocity.multiplyScalar(0.99);

    speed = velocity.length()*10;

    document.getElementById("speed").innerText = Math.floor(speed);
    document.getElementById("mode").innerText = warp ? "WARP" : "CRUISE";

    engineGlow.scale.setScalar(1+velocity.length()*0.5);
}

/* ANIMATE */
function animate(){
    requestAnimationFrame(animate);

    update();
    scan();

    /* camera cockpit */
    camera.position.copy(ship.position);
    camera.position.add(new THREE.Vector3(0,1,0));
    camera.quaternion.copy(ship.quaternion);

    /* stations move */
    stations.forEach(s=>{
        s.userData.angle += s.userData.speed;
        s.position.x = Math.cos(s.userData.angle)*s.userData.radius;
        s.position.z = Math.sin(s.userData.angle)*s.userData.radius;
    });

    /* target UI */
    const t = getClosestPlanet();
    if(t){
        document.getElementById("target").innerText = "TARGET: "+t.userData.name;
        document.getElementById("distance").innerText =
        "DIST: "+Math.floor(ship.position.distanceTo(t.position));
    }

    renderer.render(scene,camera);
}
animate();

/* RESIZE */
addEventListener("resize",()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
