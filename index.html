<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GALAXY SYSTEM</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; color:white; font-family:sans-serif;}
#ui {
    position:absolute;
    top:20px;
    left:20px;
    z-index:10;
}
.panel {
    background:rgba(0,0,0,0.6);
    padding:15px;
    border:1px solid rgba(0,150,255,0.3);
    backdrop-filter: blur(10px);
    max-width:300px;
}
button {
    margin-top:5px;
    padding:5px 10px;
    background:#0ea5e9;
}
</style>
</head>

<body>

<div id="ui">
    <div class="panel">
        <h2>🛰️ Galaxy Control</h2>
        <p id="userPos">Lade Standort...</p>
        <p>Klicke einen Planeten 👇</p>
    </div>

    <div id="planetInfo" class="panel mt-4 hidden"></div>
</div>

<script>
/* =====================
   SCENE
===================== */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});

renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* =====================
   LIGHT
===================== */
const light = new THREE.PointLight(0xffffff, 2, 300);
scene.add(light);

/* =====================
   STARS
===================== */
const starGeo = new THREE.BufferGeometry();
const starVertices = [];

for(let i=0;i<10000;i++){
    starVertices.push(
        Math.random()*2000-1000,
        Math.random()*2000-1000,
        Math.random()*2000-1000
    );
}

starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices,3));
const starMat = new THREE.PointsMaterial({color:0xffffff});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

/* =====================
   PLANETS DATA (ECHT)
===================== */
const planetsData = [
{ name:"Merkur", size:1, dist:10, color:0xaaaaaa, info:"Kleinster Planet. Sehr heiß & kalt." },
{ name:"Venus", size:1.5, dist:15, color:0xffcc66, info:"Heißester Planet (~470°C)." },
{ name:"Erde", size:1.6, dist:20, color:0x3399ff, info:"Unser Zuhause 🌍" },
{ name:"Mars", size:1.2, dist:25, color:0xff3300, info:"Roter Planet. Früher evtl. Wasser." },
{ name:"Jupiter", size:4, dist:35, color:0xff9966, info:"Größter Planet." },
{ name:"Saturn", size:3.5, dist:45, color:0xffcc99, info:"Hat Ringe." },
{ name:"Uranus", size:2.5, dist:55, color:0x66ffff, info:"Rotiert seitlich." },
{ name:"Neptun", size:2.5, dist:65, color:0x3366ff, info:"Stärkste Winde." }
];

let planets = [];

/* =====================
   CREATE PLANETS
===================== */
planetsData.forEach(p => {
    const geo = new THREE.SphereGeometry(p.size, 32, 32);
    const mat = new THREE.MeshStandardMaterial({color:p.color});
    const mesh = new THREE.Mesh(geo, mat);

    mesh.position.x = p.dist;
    mesh.userData = p;

    scene.add(mesh);
    planets.push(mesh);
});

/* =====================
   CAMERA
===================== */
camera.position.z = 80;

/* =====================
   CLICK SYSTEM
===================== */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click", (event)=>{
    mouse.x = (event.clientX / innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(planets);

    if(intersects.length > 0){
        const planet = intersects[0].object;
        showPlanetInfo(planet.userData);

        // Kamera Flug 🚀
        const target = planet.position.clone();
        animateCamera(target);
    }
});

/* =====================
   CAMERA ANIMATION
===================== */
function animateCamera(target){
    let step = 0;

    const interval = setInterval(()=>{
        step += 0.02;
        camera.position.lerp(new THREE.Vector3(target.x, target.y, target.z+5), step);

        if(step >= 1) clearInterval(interval);
    },16);
}

/* =====================
   PLANET INFO PANEL
===================== */
function showPlanetInfo(data){
    const el = document.getElementById("planetInfo");
    el.classList.remove("hidden");

    el.innerHTML = `
    <h3>${data.name}</h3>
    <p>${data.info}</p>
    <button onclick="resetCam()">Zurück</button>
    `;
}

/* =====================
   RESET CAMERA
===================== */
function resetCam(){
    camera.position.set(0,0,80);
}

/* =====================
   USER LOCATION 🌍
===================== */
navigator.geolocation.getCurrentPosition(pos=>{
    document.getElementById("userPos").innerText =
    "Dein Standort: " + pos.coords.latitude.toFixed(2) + " / " + pos.coords.longitude.toFixed(2);
});

/* =====================
   ANIMATION LOOP
===================== */
function animate(){
    requestAnimationFrame(animate);

    planets.forEach(p=>{
        p.rotation.y += 0.01;
    });

    renderer.render(scene, camera);
}
animate();

/* =====================
   RESIZE
===================== */
window.addEventListener("resize", ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
