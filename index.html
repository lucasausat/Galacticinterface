<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SPACE GAME AAA - REAL PHYSICS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
    body { margin:0; overflow:hidden; background:black; font-family: sans-serif; }
    #ui { position:absolute; top:20px; left:20px; color:white; z-index:10; pointer-events:none; }
    .panel { background:rgba(0,0,0,0.7); padding:15px; border:1px solid rgba(0,150,255,0.5); border-radius: 8px; }
</style>
</head>
<body>

<div id="ui">
    <div class="panel">
        🚀 <b>WASD</b> = Steuern<br>
        🚀 <b>SHIFT</b> = Boost<br>
        🪐 <b>E</b> = Landen (nah am Planeten)<br>
        🌌 <b>Q</b> = Starten / Zurück ins All<br>
        🎥 <b>C</b> = Kamera (Cockpit/Follow)<br>
        🖱️ <b>KLICK</b> = Laser
    </div>
    <div id="info" class="panel mt-2 text-cyan-400 font-bold">Systeme bereit...</div>
</div>

<script>
/* =====================
   BASIC SETUP
===================== */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 20000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

/* =====================
   LIGHTING
===================== */
const sunLight = new THREE.PointLight(0xffffff, 2, 0);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x404040, 0.5));

/* =====================
   STARFIELD
===================== */
const starGeo = new THREE.BufferGeometry();
let starVertices = [];
for(let i=0; i<15000; i++){
    starVertices.push((Math.random()-0.5)*10000, (Math.random()-0.5)*10000, (Math.random()-0.5)*10000);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff, size: 1.5}));
scene.add(stars);

/* =====================
   PLANETS
===================== */
const loader = new THREE.TextureLoader();
const planets = [];
function createPlanet(name, size, dist, textureUrl){
    const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(size, 64, 64),
        new THREE.MeshStandardMaterial({ map: loader.load(textureUrl) })
    );
    mesh.position.x = dist;
    mesh.userData = {name: name, size: size};
    scene.add(mesh);
    planets.push(mesh);
    return mesh;
}

createPlanet("Sonne", 15, 0, "https://threejs.org/examples/textures/planets/sun.jpg");
createPlanet("Erde", 4, 60, "https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg");
createPlanet("Mars", 3, 100, "https://threejs.org/examples/textures/planets/mars_1024.jpg");
createPlanet("Jupiter", 8, 160, "https://threejs.org/examples/textures/planets/jupiter.jpg");

/* =====================
   ROCKET ASSEMBLY (The Fix)
===================== */
const rocketGroup = new THREE.Group();
scene.add(rocketGroup);

// Der Körper der Rakete
const rocketBody = new THREE.Mesh(
    new THREE.ConeGeometry(0.5, 2, 16),
    new THREE.MeshStandardMaterial({color: 0xcccccc})
);
rocketBody.rotation.x = Math.PI / 2; // Spitze zeigt nach vorn (Z-Achse)
rocketGroup.add(rocketBody);

// Das Triebwerksleuchten (fest verbunden)
const engineGlow = new THREE.Mesh(
    new THREE.SphereGeometry(0.4, 16, 16),
    new THREE.MeshBasicMaterial({color: 0x00ffff, transparent: true, opacity: 0.8})
);
engineGlow.position.z = 1.1; // Am Heck der Rakete
rocketGroup.add(engineGlow);

/* =====================
   CONTROLS & PHYSICS
===================== */
let keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

let velocity = new THREE.Vector3();
let rotationSpeed = 0.04;
let thrust = 0.015;
let landed = false;
let cockpit = false;
let currentPlanet = null;

function moveRocket() {
    if (landed) return;

    let currentThrust = thrust;
    if (keys["shift"]) currentThrust *= 3; // Boost

    // Rotation (Steuerung)
    if (keys["a"]) {
        rocketGroup.rotateY(rotationSpeed);
        rocketBody.rotation.z = THREE.MathUtils.lerp(rocketBody.rotation.z, 0.5, 0.1); // Neigen
    } else if (keys["d"]) {
        rocketGroup.rotateY(-rotationSpeed);
        rocketBody.rotation.z = THREE.MathUtils.lerp(rocketBody.rotation.z, -0.5, 0.1); // Neigen
    } else {
        rocketBody.rotation.z = THREE.MathUtils.lerp(rocketBody.rotation.z, 0, 0.1); // Aufrichten
    }

    if (keys["w"]) {
        const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(rocketGroup.quaternion);
        velocity.add(dir.multiplyScalar(currentThrust));
        engineGlow.scale.setScalar(1.5 + Math.random() * 0.5); // Flackern beim Gasgeben
    } else {
        engineGlow.scale.setScalar(0.8);
    }
    
    if (keys["s"]) {
        const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(rocketGroup.quaternion);
        velocity.add(dir.multiplyScalar(currentThrust));
    }

    rocketGroup.position.add(velocity);
    velocity.multiplyScalar(0.98); // Reibung im All für bessere Kontrolle
}

/* =====================
   CAMERA LOGIC
===================== */
function updateCamera() {
    if (cockpit) {
        camera.position.copy(rocketGroup.position);
        camera.quaternion.copy(rocketGroup.quaternion);
        return;
    }

    const offset = new THREE.Vector3(0, 2, 8).applyQuaternion(rocketGroup.quaternion);
    const targetPos = rocketGroup.position.clone().add(offset);
    camera.position.lerp(targetPos, 0.1);
    camera.lookAt(rocketGroup.position);
}

/* =====================
   LANDING SYSTEM
===================== */
window.addEventListener("keydown", e => {
    if (e.key.toLowerCase() === "e" && !landed) {
        planets.forEach(p => {
            if (rocketGroup.position.distanceTo(p.position) < p.userData.size + 5) {
                landed = true;
                currentPlanet = p;
                velocity.set(0,0,0);
                document.getElementById("info").innerText = "Gelandet auf " + p.userData.name;
            }
        });
    }
    if (e.key.toLowerCase() === "q" && landed) {
        landed = false;
        velocity.add(new THREE.Vector3(0, 0.5, 0).applyQuaternion(rocketGroup.quaternion));
        document.getElementById("info").innerText = "Startvorgang eingeleitet...";
    }
    if (e.key.toLowerCase() === "c") cockpit = !cockpit;
});

/* =====================
   ANIMATION LOOP
===================== */
function animate() {
    requestAnimationFrame(animate);
    
    moveRocket();
    updateCamera();
    
    planets.forEach(p => p.rotation.y += 0.002);
    
    renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Laser Effekt
window.addEventListener("mousedown", () => {
    const laserGeo = new THREE.BufferGeometry().setFromPoints([
        rocketGroup.position.clone(),
        rocketGroup.position.clone().add(new THREE.Vector3(0,0,-50).applyQuaternion(rocketGroup.quaternion))
    ]);
    const laser = new THREE.Line(laserGeo, new THREE.LineBasicMaterial({color: 0x00ffff}));
    scene.add(laser);
    setTimeout(() => scene.remove(laser), 50);
});

</script>
</body>
</html>
