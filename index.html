<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TERMINAL - DEEP SPACE EXPLORATION</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
    body { margin:0; overflow:hidden; background:#000; font-family: 'Courier New', monospace; color: #00f2ff; }
    
    /* Ladebildschirm */
    #loadingScreen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: black; z-index: 1000; display: flex; flex-direction: column;
        justify-content: center; align-items: center; transition: opacity 1s;
    }
    .loading-text { font-size: 1.2rem; margin-bottom: 10px; opacity: 0; animation: fadeIn 0.5s forwards; }
    #progressBar { width: 300px; height: 2px; border: 1px solid #00f2ff; position: relative; }
    #progressFill { position: absolute; height: 100%; background: #00f2ff; width: 0%; transition: width 0.2s; }

    /* HUD */
    #hud { position:absolute; width:100%; height:100%; pointer-events:none; }
    .panel { position:absolute; background: rgba(0, 15, 20, 0.7); padding: 15px; border-left: 4px solid #00f2ff; backdrop-filter: blur(5px); }
    #topBar { top:20px; left:50%; transform:translateX(-50%); width: 400px; text-align: center; }
    #bottomBar { bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:60px; min-width: 600px; justify-content: center; }
    
    /* Info & Funk */
    #infoBox { position: absolute; right: 20px; top: 100px; width: 280px; background: rgba(0, 10, 15, 0.8); border: 1px solid #00f2ff; padding: 15px; display: none; }
    #radio { position: absolute; left: 20px; top: 100px; width: 250px; font-size: 11px; color: #00ff88; }

    /* Radar System */
    #radar {
        position: absolute; bottom: 100px; right: 20px; width: 150px; height: 150px;
        border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 50%;
        background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, transparent 70%);
    }
    #radarPing {
        position: absolute; width: 100%; height: 100%; border-radius: 50%;
        border: 1px solid #00f2ff; opacity: 0; animation: ping 2s infinite;
    }
    .radar-dot { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); }

    #fuelContainer { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); width: 10px; height: 200px; border: 1px solid #00f2ff; }
    #fuelBar { position: absolute; bottom: 0; width: 100%; background: #00f2ff; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes ping { 0% { transform: scale(0); opacity: 0.5; } 100% { transform: scale(1); opacity: 0; } }
</style>
</head>
<body>

<div id="loadingScreen">
    <div id="loadText" class="loading-text">INITIALIZING QUANTUM DRIVE...</div>
    <div id="progressBar"><div id="progressFill"></div></div>
</div>

<div id="hud">
    <div id="radio" class="panel">
        <div style="font-weight: bold; margin-bottom: 5px;">[ COMMS CHANNEL ]</div>
        <div id="radioMsg">Keine eingehenden Signale...</div>
    </div>

    <div id="infoBox">
        <h3 id="infoTitle" class="text-lg font-bold border-b border-cyan-500 mb-2">---</h3>
        <p id="infoContent" class="text-xs">Scanne Oberfläche...</p>
    </div>

    <div id="radar"><div id="radarPing"></div></div>

    <div id="topBar" class="panel">
        <div id="target">SCANNING GALAXY...</div>
        <div id="distance" class="text-xs opacity-70">DIST: ---</div>
    </div>

    <div id="fuelContainer"><div id="fuelBar" style="height: 100%;"></div></div>

    <div id="bottomBar" class="panel">
        <div>SPD: <span id="speed">0</span> km/s</div>
        <div>FUEL: <span id="fuelPerc">100</span>%</div>
        <div>MODE: <span id="mode">STABLE</span></div>
    </div>
</div>

<script>
/** 1. LOADING LOGIC **/
const loadMessages = ["BOOTING OS...", "MAPPING GALAXY...", "HEATING ION CORE...", "CALIBRATING HUD...", "READY."];
let loadIdx = 0;
const fill = document.getElementById("progressFill");
const txt = document.getElementById("loadText");

const loadInterval = setInterval(() => {
    loadIdx++;
    fill.style.width = (loadIdx * 20) + "%";
    txt.innerText = loadMessages[Math.min(loadIdx, loadMessages.length-1)];
    if(loadIdx >= 5) {
        clearInterval(loadInterval);
        setTimeout(() => document.getElementById("loadingScreen").style.opacity = "0", 500);
    }
}, 600);

/** 2. THREE.JS ENGINE **/
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 300000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Starfield
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for(let i=0; i<40000; i++) starPos.push((Math.random()-0.5)*200000, (Math.random()-0.5)*200000, (Math.random()-0.5)*200000);
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 1.5})));

const sunLight = new THREE.PointLight(0xffffff, 2, 10000);
sunLight.position.set(500, 500, 500);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x111122));

/** 3. PLANETS & LORE **/
const planets = [];
const radarDots = [];

function createPlanet(name, size, pos, color, lore, msg) {
    const group = new THREE.Group();
    const p = new THREE.Mesh(new THREE.SphereGeometry(size, 64, 64), new THREE.MeshStandardMaterial({color, roughness:0.8, emissive:color, emissiveIntensity:0.1}));
    group.position.copy(pos);
    group.add(p);
    
    // Atmosphere
    group.add(new THREE.Mesh(new THREE.SphereGeometry(size*1.05, 32, 32), new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.1, side: THREE.BackSide})));

    // 3D Label
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 512; canvas.height = 128;
    ctx.fillStyle = "#00f2ff"; ctx.font = "Bold 80px Courier New";
    ctx.fillText(name.toUpperCase(), 10, 80);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: new THREE.CanvasTexture(canvas)}));
    sprite.position.y = size + 15; sprite.scale.set(40, 10, 1);
    group.add(sprite);

    p.userData = { name, lore, msg, radius: size };
    scene.add(group);
    planets.push(p);

    // Radar dot entry
    const dot = document.createElement('div');
    dot.className = "radar-dot";
    document.getElementById("radar").appendChild(dot);
    radarDots.push({dot, obj: p});
}

createPlanet("Terra Nova", 80, new THREE.Vector3(2000, 0, -3000), 0x00aaff, "Zentrum der interstellaren Allianz.", "Willkommen im Orbit von Terra Nova. Bitte halten Sie Ihre Flugvektoren stabil.");
createPlanet("Ignis IV", 60, new THREE.Vector3(-2500, 300, -1000), 0xff5500, "Vulkanische Höllenwelt. Abbau von Plasmaerz.", "ACHTUNG: Extreme Hitzeentwicklung detektiert. Schilde aktivieren.");
createPlanet("Frost-Station", 40, new THREE.Vector3(500, -800, -5000), 0xaaffff, "Eisiges Forschungslabor am Rande des Systems.", "Signal empfangen... Forschungsprotokoll 0-8-15 läuft...");

/** 4. SHIP **/
const ship = new THREE.Group();
scene.add(ship);

let velocity = new THREE.Vector3();
let keys = {};
let fuel = 100;
let warp = false;

window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
    if(e.key === "f" && fuel > 5) warp = !warp;
});
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

/** 5. LOOP **/
function animate() {
    requestAnimationFrame(animate);

    const moveDir = new THREE.Vector3(0, 0, -1).applyQuaternion(ship.quaternion);
    if(keys["w"] && fuel > 0) {
        velocity.add(moveDir.clone().multiplyScalar(warp ? 3.0 : 0.3));
        fuel -= warp ? 0.3 : 0.02;
    }
    if(keys["a"]) ship.rotation.y += 0.025;
    if(keys["d"]) ship.rotation.y -= 0.025;
    
    ship.position.add(velocity);
    velocity.multiplyScalar(0.98);

    // Cam
    const camPos = ship.position.clone().add(new THREE.Vector3(0, 3, 12).applyQuaternion(ship.quaternion));
    camera.position.lerp(camPos, 0.1);
    camera.lookAt(ship.position.clone().add(moveDir.clone().multiplyScalar(30)));

    // Radar & Info Update
    let closest = null;
    let minDist = Infinity;
    
    radarDots.forEach(entry => {
        const relPos = entry.obj.getWorldPosition(new THREE.Vector3()).sub(ship.position);
        const d = relPos.length();
        if(d < minDist) { minDist = d; closest = entry.obj; }

        // Radar Positioning (Top-down view)
        const radarSize = 75; // radius
        const scale = 0.01;
        let rx = relPos.x * scale;
        let rz = relPos.z * scale;
        const dist = Math.sqrt(rx*rx + rz*rz);
        if(dist > radarSize) { rx *= radarSize/dist; rz *= radarSize/dist; }
        entry.dot.style.left = (75 + rx) + "px";
        entry.dot.style.top = (75 + rz) + "px";
    });

    if(closest) {
        document.getElementById("target").innerText = "TRACKING: " + closest.userData.name;
        document.getElementById("distance").innerText = "DIST: " + Math.floor(minDist) + " LY";
        
        if(minDist < 500) {
            document.getElementById("infoBox").style.display = "block";
            document.getElementById("infoTitle").innerText = closest.userData.name;
            document.getElementById("infoContent").innerText = closest.userData.lore;
            document.getElementById("radioMsg").innerText = closest.userData.msg;
        } else {
            document.getElementById("infoBox").style.display = "none";
            document.getElementById("radioMsg").innerText = "Suche Signale...";
        }
    }

    // HUD
    document.getElementById("speed").innerText = Math.floor(velocity.length() * 150);
    document.getElementById("fuelBar").style.height = fuel + "%";
    document.getElementById("fuelPerc").innerText = Math.floor(fuel);
    document.getElementById("mode").innerText = warp ? "WARP DRIVE" : "SUBLIGHT";

    renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
